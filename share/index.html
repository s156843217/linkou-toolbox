/* ============ 各區塊組裝（內容與 report 頁同源：schoolLine/riskMini 來自 report-logic.js） ============ */
function render(d){
  const liTxt=d.li?`${d.li}${d.lin?` ${d.lin}鄰`:''}`:(d.cands?`跨里（${d.cands.join('、')}）`:'');

  /* 學區 */
  let schoolHtml='';
  if(d.school){
    const multiEs=d.school.es.length>1, multiJh=d.school.jh.length>1;
    schoolHtml=d.school.es.map(rl=>schoolLine(rl,'es',multiEs)).join('')
              +d.school.jh.map(rl=>schoolLine(rl,'jh',multiJh)).join('');
    const fulls=new Set();
    d.school.es.forEach(rl=>{
      if(rl.base&&FULL_ES.includes(rl.base))fulls.add(rl.base);
      (rl.free||[]).forEach(s=>{if(FULL_ES.includes(s))fulls.add(s);});
    });
    fulls.forEach(s=>schoolHtml+=riskMini(s));
    if(!fulls.size)schoolHtml+=`<div class="sch-note" style="margin-top:6px">✅ 對應國小近年未列額滿，設籍具居住事實後通常可順利分發（仍以當年度公告為準）。</div>`;
  }else{
    schoolHtml=`<div class="sch-note">此${d.cands?'物件跨里（'+d.cands.join('、')+'）':'物件的里別資料不足'}，歡迎用<a href="../school/">學區快查</a>輸入完整門牌精準判定，或直接聯繫我們。</div>`;
  }

  /* 行情 */
  let mktHtml='';
  if(d.zoneData){
    const z=d.zoneData;
    mktHtml=`<div style="font-size:12.5px;color:var(--ink-soft)">所在商圈：<b style="color:var(--ink)">${z.name}</b>（近一年 ${z.count} 筆成交）</div>
      <div class="mkt-big"><span class="v">${z.medPrice}</span><span class="u">萬/坪（中位數，不含車位）</span></div>
      <div class="mkt-meta">
        <div class="mi"><div class="mv">${z.priceRange[0]}–${z.priceRange[1]}</div><div class="mk">主力區間(萬/坪)</div></div>
        <div class="mi"><div class="mv">${z.ageMed} 年</div><div class="mk">屋齡中位</div></div>
        <div class="mi"><div class="mv">${z.roomMed} 房</div><div class="mk">主流房數</div></div>
      </div>`;
  }else{
    mktHtml=`<div class="sch-note">此位置不在六大商圈範圍內，以下列林口全區行情供參考。</div>`;
  }
  if(d.resale){
    mktHtml+=`<div class="mkt-ref">參考：林口全區成屋中位 ${d.resale.unit} 萬/坪、總價中位 ${fmt(d.resale.totalMed)} 萬（近一年 ${d.resale.n} 筆）。資料：新北市實價登錄，每月自動更新。</div>`;
  }

  /* 公車 */
  let busHtml='';
  if(d.stops.length){
    const top=d.stops.slice(0,3);
    const allRoutes=new Set(); d.stops.forEach(s=>s.r.forEach(k=>allRoutes.add(k)));
    const tpe=[...allRoutes].filter(routeToTaipei)
      .map(k=>ROUTES[k].n).sort((a,b)=>{const x=routeSortKey(a),y=routeSortKey(b);return x[0]-y[0]||(''+x[1]).localeCompare(y[1]);});
    busHtml=`<div class="bus-sum">步行 500 公尺內：<b>${d.stops.length}</b> 個站牌・<b>${allRoutes.size}</b> 條路線</div>
      <div id="smap"></div>`;
    busHtml+=top.map(s=>{
      const rn=[...new Set(s.r.map(k=>ROUTES[k]&&ROUTES[k].n).filter(Boolean))]
        .sort((a,b)=>{const x=routeSortKey(a),y=routeSortKey(b);return x[0]-y[0]||(''+x[1]).localeCompare(y[1]);});
      const shown=rn.slice(0,8).join('、')+(rn.length>8?` …等${rn.length}條`:'');
      const dir=d.coord?dirTxt(d.coord.lat,d.coord.lon,s.la,s.lo):'';
      return `<div class="bus-stop"><span class="d">${dir} ${Math.round(s.d)}m</span>
        <span><span class="n">${s.n}</span><br><span class="r">${shown}</span></span></div>`;
    }).join('');
    if(tpe.length)busHtml+=`<div class="bus-tpe"><b>🚇 可達雙北捷運／台北市區</b>：${tpe.slice(0,10).join('、')}${tpe.length>10?' …':''}</div>`;
  }else{
    busHtml=`<div class="sch-note">${d.coord?'步行 500 公尺內查無公車站牌。':'此位置無法自動定位，歡迎用「公車路線」頁查詢。'}</div>`;
  }

  /* 房貸（有帶總價才顯示） */
  let loanHtml='';
  if(d.mortgage){
    const m=d.mortgage;
    loanHtml=`<section class="panel sh-box">
      <h2><span class="bar" style="background:var(--teal)"></span>🏦 房貸月付試算</h2>
      <div style="font-size:12.5px;color:var(--ink-soft)">總價 ${fmt(m.price)} 萬・貸 ${m.ratio*100/10} 成試算</div>
      <div class="loan-big"><span class="v">${fmt(m.monthly)}</span><span class="u">元/月（本息平均攤還）</span></div>
      <div class="loan-formula">
        自備款 <b>${fmt(m.downWan)} 萬</b>　＋　貸款 <b>${fmt(m.loanWan)} 萬</b><br>
        年利率 ${m.rate}%・${m.years} 年期 → 每 100 萬月付約 ${fmt(m.per100)} 元
      </div>
      <div class="loan-note">想試不同成數、利率或寬限期？用 <a href="../mortgage/">房貸試算</a> 自己算，或直接問我們。</div>
    </section>`;
  }

  const today=new Date();
  const dateTxt=`${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

  $("#content").innerHTML=`
    <div class="sh-head">
      <div class="t1">社區置產情報</div>
      <h1>${d.name}</h1>
      <div class="addr">📍 ${d.addr||'—'}${liTxt?`　｜　${liTxt}`:''}</div>
      <div class="brand">太平洋房屋・林口捷運加盟店　製表 ${dateTxt}</div>
    </div>
    <section class="panel sh-box"><h2><span class="bar"></span>🏫 學區（114 學年度）</h2>${schoolHtml}</section>
    <section class="panel sh-box"><h2><span class="bar" style="background:var(--gold)"></span>📈 成交行情</h2>${mktHtml}</section>
    ${loanHtml}
    <section class="panel sh-box"><h2><span class="bar" style="background:var(--amber)"></span>🚌 附近公車</h2>${busHtml}</section>

    <!-- 聯絡卡（樣式與房貸頁一致；營業員資料為固定內容） -->
    <section class="panel contact">
      <div class="co">🏠 太平洋房屋 · 林口捷運加盟店</div>
      <div class="sub">想看這個社區、或想了解更多？點一下加 LINE 或直撥 👇</div>
      <div class="agents">
        <div class="agent">
          <div class="top">
            <img class="photo" src="../img/agent-lee.png" alt="李天夏" loading="lazy" onerror="this.style.display='none'">
            <div>
              <div class="nm">李天夏</div>
              <div class="ph">📞 0936-123-288</div>
              <div class="acts">
                <a class="btn btn-line" href="https://line.me/ti/p/oCqi-eVJvI" target="_blank" rel="noopener">＋ 加 LINE</a>
                <a class="btn btn-call" href="tel:0936123288">撥打電話</a>
              </div>
            </div>
          </div>
          <div class="lic">不動產經紀人 (114)新北經字第004786號<br>營業員字號 (108)登字第352140號</div>
        </div>
        <div class="agent">
          <div class="top">
            <img class="photo" src="../img/agent-wen.png" alt="温美慈" loading="lazy" onerror="this.style.display='none'">
            <div>
              <div class="nm">温美慈</div>
              <div class="ph">📞 0976-109-326</div>
              <div class="acts">
                <a class="btn btn-line" href="https://line.me/ti/p/KLYEW95HzP" target="_blank" rel="noopener">＋ 加 LINE</a>
                <a class="btn btn-call" href="tel:0976109326">撥打電話</a>
              </div>
            </div>
          </div>
          <div class="lic">營業員字號 (113)登字第471408號</div>
        </div>
      </div>
    </section>

    <div class="disc">
      ⚠️ 本頁由林口置產工具箱自動彙整，僅供參考：學區資料具時效性，額滿與分發以當年度學校及區公所公告為準；
      行情為近一年實價登錄之商圈層級統計（不含車位、排除透天與特殊交易），非個案估價；房貸試算不代表銀行核貸條件。重大決策請洽專業人士確認。
    </div>
    <footer>
      太平洋房屋・林口捷運加盟店 ｜ 李天夏 · 温美慈<br>
      本頁結果僅供參考，不構成任何財務或法律建議
    </footer>`;

  drawMap(d);
}

/* 公車地圖：本案＋最近三站（可拖拉、關滾輪縮放以免滑頁面誤觸） */
let sMap=null;
function drawMap(d){
  const el=document.getElementById('smap');
  if(!el||!d.coord||!d.stops.length)return;
  if(typeof L==='undefined'){el.outerHTML='<div class="sch-note">（地圖暫時無法載入，方向與距離見下方清單）</div>';return;}
  if(sMap){sMap.remove();sMap=null;}
  const home=[d.coord.lat,d.coord.lon];
  sMap=L.map(el,{scrollWheelZoom:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(sMap);
  L.marker(home,{icon:L.divIcon({className:'',html:'<div style="font-size:15px;font-weight:900;color:#9C4A2B;white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff">📍 本案</div>',iconSize:[0,0]})}).addTo(sMap);
  const pts=[home];
  d.stops.slice(0,3).forEach(s=>{
    const p=[s.la,s.lo]; pts.push(p);
    L.polyline([home,p],{color:'#3C7A62',weight:1.5,dashArray:'4 4',opacity:.8}).addTo(sMap);
    L.circleMarker(p,{radius:6,color:'#2E5F4C',weight:2,fillColor:'#fff',fillOpacity:1}).addTo(sMap)
      .bindPopup(`<b>${s.n}</b><br>約 ${Math.round(s.d)} 公尺`);
    L.marker(p,{icon:L.divIcon({className:'',html:`<div style="font-size:11px;font-weight:700;color:#2E5F4C;white-space:nowrap;transform:translate(9px,-7px);text-shadow:0 0 3px #fff,0 0 3px #fff">${s.n} ${Math.round(s.d)}m</div>`,iconSize:[0,0]})}).addTo(sMap);
  });
  sMap.fitBounds(pts,{padding:[30,30],maxZoom:17});
}

}

let curD=null;                          // 目前顯示中的報告資料（分享時取用）

function initLiff(){
  if(typeof liff==='undefined')return;              // SDK 沒載到 → 當一般網頁，功能不受影響
  liff.init({liffId:LIFF_ID}).then(()=>{
    if(!curD)return;                                 // 沒有報告內容就不需要分享鈕
    // 只在「LINE 內開啟」或「已登入 LINE」時顯示分享鈕，一般瀏覽器訪客看不到
    if((liff.isInClient()||liff.isLoggedIn())&&liff.isApiAvailable('shareTargetPicker')){
      const b=$("#liffShare");
      b.style.display='block';
      document.querySelector('.wrap').style.paddingBottom='64px';  // 避免浮動鈕蓋住頁尾
      b.addEventListener('click',doShare);
    }
  }).catch(()=>{});                                  // init 失敗（如本機測試）不影響網頁本身
}
async function doShare(){
  const b=$("#liffShare");
  try{
    const res=await liff.shareTargetPicker([buildFlex(curD)]);
    if(res){ b.textContent='✅ 已送出'; setTimeout(()=>{b.textContent='📤 LINE 分享這份情報';},2500); }
  }catch(e){
    alert('分享未完成，請改用複製網址的方式傳送。\n('+(e&&e.message?e.message:e)+')');
  }
}
/* 把報告重點組成一張 Flex 圖卡；配色沿用全站設計系統（深棕頭＋陶土橘按鈕） */
function buildFlex(d){
  // 圖卡上的按鈕連到 LIFF 網址：客戶在 LINE 內點開＝全螢幕情報頁，也能再轉傳
  const q=new URLSearchParams(location.search), parts=[];
  ['c','a','p'].forEach(k=>{const v=q.get(k);if(v)parts.push(k+'='+encodeURIComponent(v));});
  const link='https://liff.line.me/'+LIFF_ID+(parts.length?'?'+parts.join('&'):'');

  const rows=[];
  const row=(k,v,vColor)=>rows.push({type:'box',layout:'baseline',spacing:'sm',contents:[
    {type:'text',text:k,size:'sm',color:'#8A7D6C',flex:3},
    {type:'text',text:v,size:'sm',color:vColor||'#26221C',weight:'bold',flex:7,wrap:true}]});
  if(d.school){
    const es=[...new Set(d.school.es.map(r=>r.base||'自由學區'))];
    const hot=d.school.es.some(r=>r.base&&FULL_ES.includes(r.base));
    row('🏫 國小',es.join('／')+(hot?'（🔥額滿校）':''),hot?'#B23F2A':null);
    const jh=[...new Set(d.school.jh.map(r=>r.base||'自由學區'))];
    if(jh.length)row('🏫 國中',jh.join('／'));
  }
  if(d.zoneData)row('📈 行情',d.zoneData.medPrice+' 萬/坪・'+d.zoneData.name);
  else if(d.resale)row('📈 行情','全區中位 '+d.resale.unit+' 萬/坪');
  if(d.mortgage)row('🏦 月付','約 '+fmt(d.mortgage.monthly)+' 元（貸'+(d.mortgage.ratio*10)+'成/'+d.mortgage.years+'年）');
  if(d.stops&&d.stops.length){
    const rt=new Set(); d.stops.forEach(s=>s.r.forEach(k=>rt.add(k)));
    row('🚌 公車','500m 內 '+d.stops.length+' 站牌・'+rt.size+' 條路線');
  }

  const head=[
    {type:'text',text:'社區置產情報',size:'xs',color:'#C9A24A',weight:'bold'},
    {type:'text',text:d.name,size:'xl',color:'#F7EEDF',weight:'bold',wrap:true}
  ];
  if(d.addr)head.push({type:'text',text:'📍 '+d.addr,size:'xxs',color:'#C9B89B',wrap:true,margin:'sm'});

  return {type:'flex',altText:'【'+d.name+'】林口置產情報：學區/行情/公車/房貸一頁看懂',
    contents:{type:'bubble',
      header:{type:'box',layout:'vertical',backgroundColor:'#2C2620',paddingAll:'16px',contents:head},
      body:{type:'box',layout:'vertical',spacing:'md',contents:rows},
      footer:{type:'box',layout:'vertical',spacing:'sm',contents:[
        {type:'button',style:'primary',color:'#BD5E39',height:'sm',
          action:{type:'uri',label:'查看完整情報 →',uri:link}},
        {type:'text',text:'太平洋房屋・林口捷運加盟店',size:'xxs',color:'#8A7D6C',align:'center',margin:'sm'}
      ]}
    }};
}

/* ============ 啟動：由網址參數決定內容 ============ */
(function init(){
  const q=new URLSearchParams(location.search);
  /* 從 liff.line.me 進來的第一步會帶 liff.state 轉址參數：
     先顯示讀取中，讓 liff.init 把網址換回真正的 ?c=/?a= 再重新進到這裡 */
  if(q.get('liff.state')!=null){
    $("#content").innerHTML='<div class="panel sh-empty" style="margin-top:14px"><p>資料讀取中…</p></div>';
    initLiff(); return;
  }
  const price=parseFloat(q.get('p'))||0;
  const loan={price,ratio:0.8,rate:2.7,years:30};   // 分享頁用預設條件（8 成、2.7%、30 年）
  let d=null;
  const a=q.get('a'), c=q.get('c');
  if(a)d=buildFromAddress(a,loan);
  else if(c){
    if(COMMUNITY[c])d=buildFromCommunity(c,loan);
    else{ // 容錯：名稱不完全相符時試別名
      const k=Object.keys(ALIASES||{}).find(k=>k===c);
      if(k&&COMMUNITY[ALIASES[k]])d=buildFromCommunity(ALIASES[k],loan);
    }
  }
  if(d){curD=d;render(d);} else renderEmpty();
  initLiff();
})();
</script>
<script src="../internal-nav.js"></script>
</body>
</html>
